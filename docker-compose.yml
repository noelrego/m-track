services:
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
      target: development
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "while true; do sleep 3600; done"
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
      target: development
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "while true; do sleep 3600; done"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-m_track}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
